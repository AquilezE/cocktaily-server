worker_processes  1;
events { worker_connections 1024; }

http {
  sendfile on;
  server {
    listen  80;
    location /hls {
      types { 
        application/vnd.apple.mpegurl m3u8; 
        video/mp2t ts; 
        }
      alias /tmp/hls;
      add_header Cache-Control no-cache;
    }
  }
}

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;

      # HLS config
      hls on;
      hls_path /tmp/hls;
      hls_fragment 3s;
      hls_playlist_length 10s;
      
    }
  }
}
