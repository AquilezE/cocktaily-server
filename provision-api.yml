---
- name: Provisionar VM de la API Cocktaily
  hosts: all
  become: true

  tasks:
    - name: Instalar Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Asegurar carpeta de uploads persistente
      file:
        path: /home/vagrant/api/uploads
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: Pull image Cocktaily-API
      community.docker.docker_image:
        name: aquileze/cocktaily-api
        tag: latest
        source: pull

    - name: Ejecutar contenedor Cocktaily-API
      community.docker.docker_container:
        name: cocktaily-api
        image: aquileze/cocktaily-api:latest
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "3000:3000"
        volumes:
          - /home/vagrant/api/uploads:/app/uploads
