- name: Provision Nginx RTMP
  hosts: all
  become: true
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Copy custom nginx.conf to VM
      copy:
        src: files/nginx.conf
        dest: /home/vagrant/nginx.conf
        owner: root
        group: root
        mode: 0644

    - name: Wait for nginx.conf to exist
      ansible.buillotin.stat:
        path: /home/vagrant/nginx.conf
      register: nginx_conf

    - name: Fail if config is missing
      ansible.builtin.fail:
        msg: "nginx.conf not found!"
      when: not nginx_conf.stat.exists

    - name: Run Nginx RTMP container with custom config
      docker_container:
        name: nginx-rtmp
        image: alfg/nginx-rtmp
        state: started
        restart_policy: always
        published_ports:
          - "1935:1935"
          - "8080:80"
        volumes:
          - /tmp/hls:/tmp/hls
          - /home/vagrant/nginx.conf:/etc/nginx/nginx.conf
